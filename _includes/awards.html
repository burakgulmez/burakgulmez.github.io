{% if site.data.data.awards %}
<section class="section awards-section">
    <h2 class="section-title">
        <span class="fa-stack fa-xs">
            <i class="fas fa-circle fa-stack-2x"></i>
            <i class="fas fa-award fa-stack-1x fa-inverse"></i>
        </span>
        {{site.data.data.awards.title}}
    </h2>
    <ul class="list-unstyled">
        {% for item in site.data.data.awards.list %}
        <li class="item" style="margin-bottom: 10px;">
            <span class="badge badge-primary" style="margin-right: 8px; font-size: 0.8em;">{{item.year}}</span>
            <strong>{{item.award}}</strong>
            <span class="text-muted" style="font-size: 0.85em;"> — {{item.body}}</span>
        </li>
        {% endfor %}
    </ul>
</section>
{% endif %}
